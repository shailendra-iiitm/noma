# Model Configuration
model:
  name: "NOMA_GNN"
  node_features: 12  # Number of features per user
  edge_features: 4   # Number of features per potential pair
  hidden_dim: 64
  num_layers: 3
  dropout: 0.1
  learning_rate: 0.001

data:
  batch_size: 32
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  num_workers: 4

training:
  epochs: 100
  patience: 10  # early stopping
  checkpoint_dir: "checkpoints"
  log_interval: 10

system:
  seed: 42
  device: "cuda"  # or "cpu"
  num_gpus: 1
